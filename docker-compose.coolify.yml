# ─── Coolify — déploiement production ────────────────────────────────────────
# Utiliser ce fichier comme "Docker Compose" dans Coolify.
#
# Variables d'environnement à configurer dans Coolify :
#   PORT                 = 3002
#   PANEL_URL            = https://votre-panel.domaine.com
#   PANEL_API_KEY        = (clé API dans Paramètres → Clé API du panel)
#   WALLET_URL           = https://wallet.domaine.com   (addon Wallet, OBLIGATOIRE)
#   WALLET_SERVICE_TOKEN = (JWT d'un compte ADMIN du panel)
#   DOMAIN               = orders.domaine.com
#   NODE_ENV             = production
#
# Volume persistant Coolify :
#   Source : orders_data   |   Destination : /app/data
#
# Important : n'exposer que le port 3002 (NestJS).
# Traefik route automatiquement via les labels.

services:
  orders:
    image: "${SERVICE_IMAGE:-ghcr.io/BloumeSAS/UHQ-Addon-Orders:latest}"
    # Ou utiliser le build local :
    # build: .
    restart: unless-stopped
    environment:
      PORT:                 "${PORT:-3002}"
      PANEL_URL:            "${PANEL_URL}"
      PANEL_API_KEY:        "${PANEL_API_KEY}"
      WALLET_URL:           "${WALLET_URL}"
      WALLET_SERVICE_TOKEN: "${WALLET_SERVICE_TOKEN}"
      DB_PATH:              /app/data/orders-data.json
      NODE_ENV:             production
    volumes:
      - orders_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/uhq-manifest.json"]
      interval: 30s
      timeout:  5s
      retries:  3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orders.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.orders.entrypoints=https"
      - "traefik.http.routers.orders.tls.certresolver=letsencrypt"
      - "traefik.http.services.orders.loadbalancer.server.port=3002"

volumes:
  orders_data:
    driver: local
